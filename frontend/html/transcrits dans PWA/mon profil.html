<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mon profil.css">
    <title>Mon profil</title>
</head>
<body>
    <header>
        <button type="button" class="MENU">
            <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M34.125 21.0001H7.875M34.125 31.0976H7.875M34.125 10.9026H7.875" stroke="black" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round"/>
            </svg>
        </button><span class="titre-header">Mon profil</span>
    </header>

    <section class="profil">
        <div class="photo-profil"></div>
        <button type="button" class="ajout-photo"> Ajouter une photo</button>
    </section>

    <section class="infos-profil">
        <table class="tableau-profil">
            <tr>
                <td>
                    <label>
                        Prénom
                        <input type="text">
                    </label>
                </td>
            </tr>
            <tr>
                <td>
                    <label>
                        Nom
                        <input type="text">
                    </label>
                </td>
            </tr>
            <tr>
                <td>
                    <label>
                        Adresse e-mail
                        <input type="email">
                    </label>
                </td>
            </tr>
        </table>
    </section>

    <button type="button" class="Enregistrer">Enregistrer</button>


</body>
</html>
